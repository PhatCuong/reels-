<!doctype html>
<html lang="en">
<head>

    p { color: #cbd5e1; line-height: 1.7; font-size: 18px; }
    a { color: #38bdf8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
  </style>
</head>

  <main>
    <section class="card">

      </p>
